function drawBoard() {
  drawWoodFrame();
  ctx.fillStyle=C.felt; ctx.fillRect(IX,IY,PLAY_W,IH);
  const fv=ctx.createRadialGradient(IX+PLAY_W/2,IY+IH/2,IH*.1,IX+PLAY_W/2,IY+IH/2,IH*.8);
  fv.addColorStop(0,'rgba(255,255,255,0.04)'); fv.addColorStop(1,'rgba(0,0,0,0.25)');
  ctx.fillStyle=fv; ctx.fillRect(IX,IY,PLAY_W,IH);
  drawMedallion(); drawPoints(); drawBar(); drawBearOff();
  drawQuadrantLabels(); drawPointLabels();
  drawAllHighlights(); drawAllCheckers(); drawMovableGlows(); drawSelectionRing();
  drawDiceArea(); drawClock();

  // Feature 1: draw physics dice on top of board
  if (phase === 'rolling' || phase === 'rolled' || phase === 'opening_w_rolling' || phase === 'opening_b' || phase === 'opening_b_rolling') {
    drawDicePhysics();
  }

  // Feature 6: draw animated checker on top of everything
  if (checkerAnim && !checkerAnim.done) {
    const p = checkerAnim.t / checkerAnim.duration;
    const ease = p < 0.5 ? 2*p*p : -1+(4-2*p)*p;
    const cx = checkerAnim.x + (checkerAnim.tx - checkerAnim.x) * ease;
    const cy = checkerAnim.y + (checkerAnim.ty - checkerAnim.y) * ease;
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.4)'; ctx.shadowBlur=12; ctx.shadowOffsetX=4; ctx.shadowOffsetY=4;
    drawChecker(cx, cy, checkerAnim.color);
    ctx.restore();
  }
  // Blot animation — hit checker slides to bar
  if (blotAnim) {
    const p = blotAnim.t / blotAnim.duration;
    const ease = p < 0.5 ? 2*p*p : -1+(4-2*p)*p;
    const bx = blotAnim.x + (blotAnim.tx - blotAnim.x) * ease;
    const by = blotAnim.y + (blotAnim.ty - blotAnim.y) * ease;
    ctx.save();
    ctx.globalAlpha = Math.max(0.5, 1 - p*0.3);
    ctx.shadowColor='rgba(255,80,0,0.5)'; ctx.shadowBlur=14; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
    drawChecker(bx, by, blotAnim.color);
    ctx.restore();
  }

  if(statusTimer>0&&statusMsg){
    const gcy=(TOP_BASE+PT_H+BOT_BASE-PT_H)/2, rcx=IX+HALF_W+BAR_W+HALF_W/2;
    ctx.globalAlpha=Math.min(1,statusTimer/30);
    ctx.fillStyle='#ffdd66'; ctx.font='bold 12px Courier New'; ctx.textAlign='center';
    ctx.fillText(statusMsg,rcx,gcy+5); ctx.globalAlpha=1;
  }

  if(phase==='gameover'){
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(IX,IY,PLAY_W,IH);
    const gcx=IX+PLAY_W/2, gcy=IY+IH/2;
    ctx.fillStyle='rgba(20,15,5,0.92)'; roundRect(gcx-185,gcy-65,370,155,12); ctx.fill();
    ctx.strokeStyle=C.ptGoldHi; ctx.lineWidth=2; roundRect(gcx-185,gcy-65,370,155,12); ctx.stroke();
    ctx.fillStyle=C.ptGoldHi; ctx.font='bold 28px Courier New'; ctx.textAlign='center';
    ctx.fillText(statusMsg,gcx,gcy-22);
    // White player row
    if (players.white.flag) drawCanvasFlag(players.white.flag, gcx-177, gcy+2, 38, 25);
    const _wNameX = players.white.flag ? gcx-130 : gcx-170;
    ctx.font='bold 16px Courier New'; ctx.textAlign='left';
    ctx.fillStyle=C.wBase; ctx.fillText(players.white.name.substring(0,12)+' (white)', _wNameX, gcy+18);
    ctx.font='bold 22px Courier New';
    ctx.fillText(gameScore.white, gcx+115, gcy+18);
    // Black player row
    if (players.black.flag) drawCanvasFlag(players.black.flag, gcx-177, gcy+38, 38, 25);
    const _bNameX = players.black.flag ? gcx-130 : gcx-170;
    ctx.font='bold 16px Courier New'; ctx.textAlign='left';
    ctx.fillStyle='#c8ccff'; ctx.fillText(players.black.name.substring(0,12)+' (black)', _bNameX, gcy+54);
    ctx.font='bold 22px Courier New';
    ctx.fillText(gameScore.black, gcx+115, gcy+54);
    ctx.font='11px Courier New'; ctx.fillStyle=C.labelDim; ctx.textAlign='center';
    ctx.fillText('Press  R  to play again',gcx,gcy+80);
  }

  ctx.fillStyle=C.labelDim; ctx.font='bold 12px Courier New'; ctx.textAlign='left';
  ctx.fillText('BACKGAMMON',BX+8,BY+14);
  // ── Player flag + name in top/bottom border strips (above/below tray) ──
  const _brdFW=26, _brdFH=17;
  // Use the right portion of the bottom/top borders (over the tray area)
  const _brdRight = BX + BW - 4; // right edge of board, 4px padding
  const _brdNameX = _brdRight - _brdFW - 4; // name right-aligns here, flag to its right
  // Black — top border: name left, flag right (consistent)
  ctx.fillStyle='#a8aae8'; ctx.font='bold 13px Courier New'; ctx.textAlign='right'; ctx.textBaseline='middle';
  ctx.fillText(players.black.name.substring(0,7), _brdNameX - 2, BY+9);
  drawCanvasFlag(players.black.flag, _brdRight - _brdFW, BY+1, _brdFW, _brdFH);
  // White — bottom border: name left, flag right (consistent)
  ctx.fillStyle='#d0b880'; ctx.font='bold 13px Courier New'; ctx.textAlign='right'; ctx.textBaseline='middle';
  ctx.fillText(players.white.name.substring(0,7), _brdNameX - 2, IY+IH+9);
  drawCanvasFlag(players.white.flag, _brdRight - _brdFW, IY+IH+1, _brdFW, _brdFH);
  ctx.textBaseline='alphabetic';
}

// ── Game loop ─────────────────────────────────────────────────
function update(dt) {
  // dt = elapsed time in 60fps-frame units (1.0 at 60fps, 0.5 at 120fps, 2.0 at 30fps)
  // This makes all timers frame-rate independent
  time += dt;
  if(statusTimer>0) statusTimer -= dt;
  // Always update visual effects (even during auto-skip pauses)
  if (fireworks.length > 0 || fireworkBurstQueue.length > 0) updateFireworks();
  if (billSafeAnim && !billSafeAnim.done) updateBillSafeAnim();
  if(skipTimer>0){ skipTimer -= dt; if(skipTimer<=0){ skipTimer=0; endTurn(); } return; }

  // Blot animation — hit checker sliding to bar
  if (blotAnim) {
    blotAnim.t += dt;
    if (blotAnim.t >= blotAnim.duration) blotAnim = null;
  }

  // Feature 6: checker animation — supports N-leg chains via remainingPath
  if (checkerAnim && !checkerAnim.done) {
    checkerAnim.t += dt;
    if (checkerAnim.t >= checkerAnim.duration) {
      const fp = checkerAnim.fromPt, tp = checkerAnim.toPt;
      const remaining = checkerAnim.remainingPath || [];
      checkerAnim = null;
      executeMoveFinal(fp, tp, remaining.length > 0);
      if (remaining.length > 0) executeChainMove(tp, remaining);
    }
  }

  // Auto-skip if bar entries are fully blocked (all 6 entry points covered by opponent)
  if (phase === 'idle' && skipTimer === 0 && allBarEntriesBlocked()) {
    const nm = (currentPlayer === 'white' ? 'White' : 'Black') + ' bar fully blocked — turn skipped';
    statusMsg = nm; statusTimer = 90; skipTimer = 90;
    playDisappointment();
  }

  // Chess clock — frame-rate independent via dt scaling
  if ((phase==='idle'||phase==='rolling'||phase==='rolled') && turnTimer > 0) {
    turnTimer -= dt;
    if (turnTimer <= 0 && !checkerAnim) {
      const opp = currentPlayer==='white'?'black':'white';
      gameScore[opp] += 2; // forfeit = gammon (2 pts)
      phase='gameover'; statusMsg=(currentPlayer==='white'?'WHITE':'BLACK')+' FORFEITS!';
      statusTimer=99999; playWin(); triggerFireworks(); triggerBillWinAnim(opp);
      turnTimer=-1;
    }
  }

  // Opening roll — white's die settles
  if (phase === 'opening_w_rolling') {
    if (updateDicePhysics()) {
      phase = 'opening_b';
      statusMsg = (players.white.name||'White') + ' rolled ' + openingDice[0] + '!';
      statusTimer = 90;
    }
  }
  // Opening roll — black's die settles, resolve winner
  if (phase === 'opening_b_rolling') {
    if (updateDicePhysics()) {
      const wd = openingDice[0], bd = openingDice[1];
      if (wd === bd) {
        statusMsg = 'TIE  —  Roll Again!'; statusTimer = 140;
        dicePhysics = []; dice = []; movesLeft = [];
        phase = 'opening';
      } else {
        currentPlayer = wd > bd ? 'white' : 'black';
        dice = [wd, bd]; movesLeft = [wd, bd];
        phase = 'rolled'; turnTimer = TURN_FRAMES;
        const winner = wd > bd ? (players.white.name||'White') : (players.black.name||'Black');
        statusMsg = winner + ' goes first!'; statusTimer = 130;
        if (!hasAnyLegalMove()) {
          statusMsg='No legal moves — turn passed'; statusTimer=100; skipTimer=100;
          playDisappointment();
        }
      }
    }
  }

  // Feature 1: physics dice rolling → rolled transition
  if (phase === 'rolling') {
    if (updateDicePhysics()) {
      phase = 'rolled';
      if (!hasAnyLegalMove()) {
        statusMsg='No legal moves — turn passed'; statusTimer=100; skipTimer=100;
        playDisappointment();
      }
    }
  }
}

let _lastFrameTs = 0;
function loop(now) {
  // Compute dt in 60fps-frame units regardless of actual refresh rate
  // Cap at 3 frames to avoid a huge jump after tab switching or backgrounding
  const dt = _lastFrameTs ? Math.min((now - _lastFrameTs) * 60 / 1000, 3) : 1;
  _lastFrameTs = now;
  update(dt);
  ctx.clearRect(0,0,CW,CH);
  if(phase==='title') drawTitleScreen(); else drawBoard();
  if(fireworks.length>0||fireworkBurstQueue.length>0) drawFireworks();
  if(billSafeAnim) drawBillSafeAnim();
  updateRollButton();
  requestAnimationFrame(loop);
}

// ── Input ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if(e.key==='r'||e.key==='R'){
    if(phase==='title'){ initBoard(); phase='opening'; }
    else if(phase==='gameover'){ initBoard(); phase='title'; }
    else if(phase==='opening'){ rollOpeningWhite(); }
    else if(phase==='opening_b'){ rollOpeningBlack(); }
    else { rollDice(); }
  }
  if(e.key==='Escape'){ selectedPoint=null; highlights=[]; combinedHighlights=[]; }
});

// ── Shared board tap/click handler ────────────────────────────
function handleBoardTap(clientX, clientY) {
  if(phase==='title'){ initBoard(); phase='opening'; return; }
  if(phase==='opening'){ rollOpeningWhite(); return; }
  if(phase==='opening_b'){ rollOpeningBlack(); return; }
  if(phase!=='rolled'||skipTimer>0) return;
  if(checkerAnim && !checkerAnim.done) return;

  const rect=canvas.getBoundingClientRect();
  const mx=(clientX-rect.left)*(CW/rect.width);
  const my=(clientY-rect.top)*(CH/rect.height);
  const n=pointAt(mx,my);

  if (selectedPoint !== null) {
    let chainTarget = -1;
    for (const cn of combinedHighlights) {
      const dotCx = cn === 25 ? BEAR_X + BEAR_W/2 : ptCx(cn);
      const dotCy = cn === 25 ? (currentPlayer==='white'?IY+IH*.75:IY+IH*.25) : checkerCy(cn, points[cn].count);
      const dotR = CHK_R * 0.9;
      if (Math.sqrt((mx-dotCx)**2 + (my-dotCy)**2) <= dotR) { chainTarget = cn; break; }
    }
    if (chainTarget < 0 && n >= 0 && combinedHighlights.includes(n)) chainTarget = n;
    if (chainTarget >= 0) {
      const path = findChainPath(selectedPoint, chainTarget);
      if (path) { executeChainMove(selectedPoint, path); return; }
    }
  }

  if(selectedPoint!==null&&n>=0&&highlights.includes(n)){ executeMove(selectedPoint,n); return; }

  const mustUseBar=bar[currentPlayer]>0;
  if(mustUseBar&&n!==0){ selectedPoint=null; highlights=[]; combinedHighlights=[]; return; }

  const hasOwn = n===0 ? bar[currentPlayer]>0
    : n>=1&&n<=24 && points[n].color===currentPlayer && points[n].count>0;

  if(hasOwn){
    if(selectedPoint===n){ selectedPoint=null; highlights=[]; combinedHighlights=[]; }
    else{
      selectedPoint=n;
      highlights=validDestinations(n);
      combinedHighlights=validCombinedDestinations(n);
    }
  } else { selectedPoint=null; highlights=[]; combinedHighlights=[]; }
}

canvas.addEventListener('click', e => { handleBoardTap(e.clientX, e.clientY); });

canvas.addEventListener('touchend', e => {
  e.preventDefault(); // suppress the 300ms delayed click that follows touch
  const t = e.changedTouches[0];
  handleBoardTap(t.clientX, t.clientY);
}, { passive: false });

// ── Roll button (mobile only — hidden on non-touch devices) ───
const _rollBtn = document.getElementById('roll-btn');
const _isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if (!_isTouchDevice && _rollBtn) _rollBtn.style.display = 'none';

function updateRollButton() {
  if (!_rollBtn || !_isTouchDevice) return;
  const show = phase==='idle' || phase==='opening' || phase==='opening_b'
             || phase==='title' || phase==='gameover';
  _rollBtn.style.display = show ? 'block' : 'none';
  if (phase==='idle')                          _rollBtn.textContent = '🎲  ROLL DICE';
  else if (phase==='opening')                  _rollBtn.textContent = '🎲  ROLL YOUR DIE';
  else if (phase==='opening_b')                _rollBtn.textContent = '🎲  ROLL YOUR DIE';
  else if (phase==='title' || phase==='gameover') _rollBtn.textContent = '▶  START';
}

_rollBtn && _rollBtn.addEventListener('click', () => {
  if(phase==='title'){ initBoard(); phase='opening'; }
  else if(phase==='gameover'){ initBoard(); phase='title'; }
  else if(phase==='opening'){ rollOpeningWhite(); }
  else if(phase==='opening_b'){ rollOpeningBlack(); }
  else if(phase==='idle'){ rollDice(); }
});

initBoard();
// loop() is started by the setup form submit handler

// ── Canvas scaling — fits board into any screen size ──────────
function resizeCanvas() {
  // visualViewport gives the truly visible area (excludes browser chrome,
  // on-screen keyboard, etc.) — falls back to window dimensions on older browsers
  const vw = (window.visualViewport ? window.visualViewport.width  : window.innerWidth);
  const vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
  const scale = Math.min(vw / CW, vh / CH, 1);
  canvas.style.width  = Math.round(CW * scale) + 'px';
  canvas.style.height = Math.round(CH * scale) + 'px';
}
// Listen on visualViewport for reliable mobile resize events
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', resizeCanvas);
  window.visualViewport.addEventListener('scroll', resizeCanvas);
} else {
  window.addEventListener('resize', resizeCanvas);
}
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 150));

// ── PWA: register service worker for offline play ─────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
